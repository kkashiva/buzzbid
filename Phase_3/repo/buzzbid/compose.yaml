services:
  buzzbidapp:
    build: .
    ports:
      - "8082:8082"
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=cs6400_sp24_team055'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=user'
    ports:
      - '42333:3306'
#    expose:
#      # Opens port 3306 on the container
#      - '3306'
      # Where our data will be persisted
    volumes:
      - my-db:/var/lib/mysql
      - "./scripts/team055_schema.sql:/docker-entrypoint-initdb.d/1.sql"
      - "./scripts/team055_seed_data.sql:/docker-entrypoint-initdb.d/2.sql"
# Names our volume
volumes:
  my-db: